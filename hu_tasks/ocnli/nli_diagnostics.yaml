task: nli_diagnostics
tag:
  - multiple_choice  
# dataset_path: Junrui1202/OCNLI_dev
dataset_path: json  # Or your huggingface path
dataset_kwargs:
  data_files: /root/autodl-tmp/lm-evaluation-harness/hu_tasks/nli_diagnostics.jsonl
  # data_files: /root/autodl-tmp/lm-evaluation-harness/hu_tasks/nli_data.jsonl
output_type: multiple_choice  
test_split: train

process_docs: !function utils.process_docs

# 1. Point directly to the column created in Python
doc_to_text: "{{my_custom_prompt}}"

# 2. Point directly to the integer index created in Python
doc_to_target: target_index

# 3. This MUST remain in YAML. 
# The harness needs this list upfront to calculate log-likelihoods for specific tokens.
doc_to_choice:
  # - "对"
  # - "不一定"
  # - "错"
  # - "蕴含"
  # - "中立"
  # - "矛盾"
  - "一定能"
  - "不一定"
  - "不可能"

metric_list:
  - metric: acc
    aggregation: mean
    higher_is_better: true
  - metric: acc_norm
    aggregation: mean
    higher_is_better: true
    
metadata:
  version: 2.0