task: ocnli_cui
tag:
  - multiple_choice  
# dataset_path: Junrui1202/OCNLI_dev
dataset_path: json  # Or your huggingface path
dataset_kwargs:
  data_files: /Users/hai/Documents/scratch/lm-evaluation-harness/hu_tasks/nli_data.jsonl
output_type: multiple_choice  
test_split: train

process_docs: !function utils_cui.process_docs

# Updated prompt to match the actual choices
doc_to_text: "请仔细阅读下述信息：\n前提：{{premise}}\n问题：依据上述前提，以下判断是否正确？{{hypothesis}}\n选项：对/不一定/错\n答案："

# doc_to_target should point to the integer index we created in utils.py
doc_to_target: label_index

# The order here matters! 
# 0: entailment -> 对
# 1: neutral    -> 不一定
# 2: contradiction -> 错
doc_to_choice:
  - "对"
  - "不一定"
  - "错"

metric_list:
  - metric: acc
    aggregation: mean
    higher_is_better: true
  - metric: acc_norm
    aggregation: mean
    higher_is_better: true
